# Builds Windows production installers (NSIS setup .exe + WiX .msi) for the Tauri v2 shell.
# Runners already include MSVC; Node 20 + pnpm install workspace deps; Rust stable compiles the shell.
#
# Artifacts: after a successful run, open the workflow run → "Artifacts" → download
# `restaurant-pos-windows-installers` (contains the .exe and .msi from `target/release/bundle/`).

name: Windows Tauri production build

on:
  push:
    branches: [main]

concurrency:
  group: windows-tauri-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"

jobs:
  build-windows:
    name: Windows installers (NSIS + MSI)
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Git long paths (Windows)
        run: git config --global core.longpaths true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust / Tauri build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri-pos/src-tauri

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Tauri resources (bundled API + embedded Node)
        run: node .github/scripts/prepare-tauri-windows-resources.mjs

      - name: Build Tauri Windows bundles (NSIS .exe + MSI)
        run: pnpm --filter @pos/tauri-pos run build:windows

      - name: List bundle outputs
        run: |
          Get-ChildItem -Recurse "apps/tauri-pos/src-tauri/target/release/bundle" -ErrorAction SilentlyContinue |
            Select-Object FullName, Length

      - name: Upload Windows installers (artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: restaurant-pos-windows-installers
          path: |
            apps/tauri-pos/src-tauri/target/release/bundle/nsis/*.exe
            apps/tauri-pos/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14
