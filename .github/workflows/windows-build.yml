# Builds Windows production installers (NSIS setup .exe + WiX .msi) for the Tauri v2 shell.
# Artifacts after success:
# restaurant-pos-windows-installers (.exe + .msi)

name: Windows Tauri production build

on:
  push:
    branches: [main]

concurrency:
  group: windows-build
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"

jobs:
  build-windows:
    name: Windows installers (NSIS + MSI)
    runs-on: windows-latest
    timeout-minutes: 90

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify pnpm
        run: pnpm --version

      - name: Validate Tauri config
        run: node apps/tauri-pos/src-tauri/scripts/validate-tauri-config.mjs

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri-pos/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify installer binaries
        run: |
          Write-Host "Checking installer files..."
          Get-ChildItem apps/tauri-pos/src-tauri/binaries

      - name: Build Windows bundles
        run: pnpm --filter @pos/tauri-pos run build:windows

      - name: List bundle outputs
        run: |
          Get-ChildItem -Recurse "apps/tauri-pos/src-tauri/target/release/bundle" -ErrorAction SilentlyContinue |
            Select-Object FullName, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: restaurant-pos-windows-installers
          path: |
            apps/tauri-pos/src-tauri/target/release/bundle/nsis/*.exe
            apps/tauri-pos/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14
