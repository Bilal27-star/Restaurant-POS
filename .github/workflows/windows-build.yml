name: Windows Tauri production build

on:
  push:
    branches: [main]

concurrency:
  group: windows-build
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"

jobs:
  build-windows:
    name: Windows installers (NSIS + MSI)
    runs-on: windows-latest
    timeout-minutes: 90

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri-pos/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Tauri config
        run: node apps/tauri-pos/src-tauri/scripts/validate-tauri-config.mjs

      - name: Create binaries folder
        run: |
          New-Item -ItemType Directory -Force -Path apps/tauri-pos/src-tauri/binaries

      - name: Download WebView2 installer
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "apps/tauri-pos/src-tauri/binaries/MicrosoftEdgeWebView2RuntimeInstallerX64.exe"

      - name: Verify binaries
        run: |
          $webview2 = "apps/tauri-pos/src-tauri/binaries/MicrosoftEdgeWebView2RuntimeInstallerX64.exe"
          if (-not (Test-Path $webview2)) {
            throw "Missing required file: $webview2"
          }
          Get-ChildItem apps/tauri-pos/src-tauri/binaries

      - name: Build Windows bundles
        run: pnpm --filter @pos/tauri-pos run build:windows

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: restaurant-pos-windows-installers
          path: |
            apps/tauri-pos/src-tauri/target/release/bundle/nsis/*.exe
            apps/tauri-pos/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14
