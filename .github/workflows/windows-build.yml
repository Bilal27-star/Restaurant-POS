name: Windows Tauri production build

on:
  push:
    branches: [main]

concurrency:
  group: windows-build
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"

jobs:
  build-windows:
    name: Windows installers (NSIS + MSI)
    runs-on: windows-latest
    timeout-minutes: 90

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - run: git config --global core.longpaths true

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri-pos/src-tauri

      - run: pnpm install --frozen-lockfile

      - run: node apps/tauri-pos/src-tauri/scripts/validate-tauri-config.mjs

      - name: Create binaries directory
        run: New-Item -ItemType Directory -Force -Path apps/tauri-pos/src-tauri/binaries

      - name: Download WebView2 installer
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "apps/tauri-pos/src-tauri/binaries/MicrosoftEdgeWebView2RuntimeInstallerX64.exe"

      - name: List binaries directory
        run: Get-ChildItem apps/tauri-pos/src-tauri/binaries

      - name: Assert WebView2 installer exists
        run: |
          if (!(Test-Path "apps/tauri-pos/src-tauri/binaries/MicrosoftEdgeWebView2RuntimeInstallerX64.exe")) {
            throw "WebView2 installer missing"
          }

      - name: Build Windows bundles
        run: pnpm --filter @pos/tauri-pos run build:windows

      - uses: actions/upload-artifact@v4
        with:
          name: restaurant-pos-windows-installers
          path: |
            apps/tauri-pos/src-tauri/target/release/bundle/nsis/*.exe
            apps/tauri-pos/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14
