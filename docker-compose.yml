# Local PostgreSQL for Restaurant POS API (`pnpm run db:up`).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pos_dev
    volumes:
      - pos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pos_dev"]
      interval: 3s
      timeout: 5s
      retries: 20

volumes:
  pos_pg_data:
